name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  core-regression:
    name: Core Regression Suite
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run core regression tests (required)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q tests `
            --ignore=tests/test_options_dialog_ui.py `
            --ignore=tests/test_system_info_dialog.py `
            --ignore=tests/test_set_loader.py `
            --ignore=tests/test_lyrics.py `
            --ignore=tests/test_library_archive.py

  full-suite-advisory:
    name: Full Test Suite (Advisory)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-cov
      - name: Run full suite with coverage (advisory)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests --cov=pyssp --cov-report=term-missing --cov-report=xml

